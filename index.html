<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Certification Study Coach — iCertify</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #f7f6f3;
    color: #1a1a1a;
    padding: 2rem 1rem;
  }
  .page {
    max-width: 820px;
    margin: 0 auto;
  }
  h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }
  p {
    font-size: 14px;
    color: #666;
    margin-bottom: 1.5rem;
  }
  .card {
    background: #fff;
    border: 0.5px solid #ddd;
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  label {
    font-size: 13px;
    color: #666;
    display: block;
    margin-bottom: 8px;
  }
  textarea {
    width: 100%;
    min-height: 160px;
    resize: vertical;
    font-size: 14px;
    line-height: 1.6;
    border: 0.5px solid #ccc;
    border-radius: 8px;
    padding: 10px 12px;
    background: #fafafa;
  }
  button {
    background: #111;
    color: #fff;
    border: none;
    padding: 10px 22px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    margin-top: 12px;
  }
  button:hover {
    opacity: 0.85;
  }
  .footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 12px;
    color: #bbb;
  }
</style>
</head>

<body>
<div class="page">
  <h1>Certification Study Coach</h1>
  <p>Paste your study notes or exam topics below. This placeholder version does not analyze content yet — it simply provides the UI structure.</p>

  <div class="card">
    <label for="notes">Study notes or topics</label>
    <textarea id="notes" placeholder="Paste your notes here..."></textarea>
    <button disabled>Analyze (coming soon)</button>
  </div>

  <div class="footer">Powered by iCertify</div>
</div>
</body>
</html>
